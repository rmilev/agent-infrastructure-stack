  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

= 'undefined') { setTimeout(render, 120); return; }\n    document.querySelectorAll('[data-qr]').forEach(function(el){\n      if (el.getAttribute('data-qr-done')) return;\n      var url = el.getAttribute('data-qr');\n      var qr = qrcode(0, 'M');\n      qr.addData(url);\n      qr.make();\n      var n = qr.getModuleCount();\n      var pad = 4; // quiet zone in modules\n      var total = n + pad*2;\n      var fg = el.getAttribute('data-qr-fg') || '#1a1410';\n      var svg = '<svg width=\"'+el.getAttribute('data-qr-size')+'\" height=\"'+el.getAttribute('data-qr-size')+'\" viewBox=\"0 0 '+total+' '+total+'\" style=\"border-radius:10px; display:block; flex-shrink:0;\">';\n      svg += '<rect x=\"0\" y=\"0\" width=\"'+total+'\" height=\"'+total+'\" rx=\"2\" fill=\"#ffffff\"><\u002Frect>';\n      for (var r=0; r<n; r++){\n        for (var c=0; c<n; c++){\n          if (qr.isDark(r,c)){\n            svg += '<rect x=\"'+(c+pad)+'\" y=\"'+(r+pad)+'\" width=\"1.04\" height=\"1.04\" fill=\"'+fg+'\"><\u002Frect>';\n          }\n        }\n      }\n      svg += '<\u002Fsvg>';\n      el.innerHTML = svg;\n      el.setAttribute('data-qr-done','1');\n    });\n  }\n  render();\n  // re-run on later renders / slide changes\n  var mo = new MutationObserver(function(){ render(); });\n  if (document.body) mo.observe(document.body, {childList:true, subtree:true});\n  document.addEventListener('DOMContentLoaded', render);\n})();\n<\u002Fscript>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"34e29f6c-8043-4b66-9a4b-0ce33069c1af#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\" data-uneditable=\"\">\n\n<!-- ===== SLIDE 1 · TITLE ===== -->\n<section data-label=\"Title\" data-screen-label=\"01\" data-speaker-notes=\"Two speakers — Roberto Milev (Chief Architect) and Uday Kanagala (Principal Architect) at Navan. Set the frame: this is a practitioner talk about the infrastructure stack emerging under AI agents, mapped against the microservices maturation curve.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:90px 116px; display:flex; flex-direction:column; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"position:absolute; right:-120px; top:-170px; width:780px; height:390px; background:linear-gradient(180deg,rgba(124,77,255,0.30),rgba(80,36,199,0.02)); border-top-left-radius:780px; border-top-right-radius:780px; filter:blur(8px); opacity:0.7;\"><\u002Fdiv>\n  <div style=\"display:flex; justify-content:space-between; align-items:center; position:relative;\">\n    <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"height:40px; width:auto; display:block;\">\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:24px; letter-spacing:0.14em; color:#8a8175;\">ENGINEERING<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center; position:relative;\">\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:26px; letter-spacing:0.12em; color:#5024C7; margin-bottom:30px;\">AI Engineer World's Fair 2026 &nbsp;|&nbsp; July 1<\u002Fdiv>\n    <h1 style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:108px; line-height:0.96; letter-spacing:-0.035em; color:#1a1410; text-wrap:balance;\">Agents Are Where Microservices Were in 2015<\u002Fh1>\n    <h2 style=\"font-family:'Archivo',sans-serif; font-weight:500; font-size:48px; margin-top:30px; letter-spacing:-0.02em; background:linear-gradient(90deg,#5024C7,#FF6A2B); -webkit-background-clip:text; background-clip:text; color:transparent; width:fit-content;\">We're making all the same mistakes.<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:flex; justify-content:space-between; align-items:flex-end; border-top:1px solid rgba(26,20,16,0.14); padding-top:30px; position:relative;\">\n    <div style=\"display:flex; gap:64px;\">\n      <div>\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:28px; color:#1a1410;\">Roberto Milev<\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:24px; color:#897f72; margin-top:5px;\">Chief Architect @ Navan<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:28px; color:#1a1410;\">Uday Kanagala<\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:24px; color:#897f72; margin-top:5px;\">Principal Architect @ Navan<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:24px; color:#897f72;\">20 MIN · 12 SLIDES<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 2 · HOOK / QUOTE ===== -->\n<section data-label=\"Hook\" data-screen-label=\"02\" data-speaker-notes=\"Read the quote on screen. Pause. Then: 'Agents are in that exact phase right now. Everyone's building them. Almost nobody is thinking about the infrastructure underneath.' Deliver the punchline: 'If you can't get a single prompt to work reliably, what makes you think a multi-agent system is the answer?' Then ground it: 30 agents in production, 20K sessions/day, a billion tokens/day. Here's the stack that's emerging.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:96px 130px; display:flex; flex-direction:column; justify-content:center; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <div style=\"position:absolute; left:50%; bottom:-60px; transform:translateX(-50%); width:1100px; height:550px; border:2px solid rgba(80,36,199,0.14); border-bottom:none; border-top-left-radius:1100px; border-top-right-radius:1100px;\"><\u002Fdiv>\n  \n  <div style=\"position:relative;\">\n    <div style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:200px; line-height:0.7; color:rgba(80,36,199,0.32); height:120px;\">“<\u002Fdiv>\n    <blockquote style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:66px; line-height:1.12; letter-spacing:-0.025em; color:#1a1410; max-width:1500px; margin:0;\">If you can't build a well-structured monolith, what makes you think microservices is the answer?<\u002Fblockquote>\n    <div style=\"margin-top:50px; display:flex; align-items:center; gap:18px;\">\n      <span style=\"width:46px; height:2px; background:#FF6A2B;\"><\u002Fspan>\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:27px; color:#5024C7;\">Simon Brown<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:20px; color:#8a8175;\">2015<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 3 · REFERENCE ARCHITECTURE (HERO) ===== -->\n<section data-label=\"Architecture\" data-screen-label=\"03\" data-speaker-notes=\"As we've been building agentic systems — and as the industry matures — a reference architecture is taking shape. Not everyone draws it the same way, but the layers keep showing up. We'll walk through it bottom-up: from the foundation (where the agent runs) up to whether you need one agent or many.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:64px 96px; display:flex; flex-direction:column; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid rgba(26,20,16,0.14); padding-bottom:22px;\">\n    <div>\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:18px; letter-spacing:0.16em; color:#5024C7;\">THE STACK THAT'S EMERGING<\u002Fdiv>\n      <h1 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:54px; letter-spacing:-0.025em; color:#1a1410; margin-top:12px;\">A Reference Architecture Is Emerging<\u002Fh1>\n    <\u002Fdiv>\n    <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <\u002Fdiv>\n\n  <div style=\"flex:1; display:flex; flex-direction:column; gap:13px; margin-top:24px; margin-bottom:104px; max-width:1340px; width:100%; align-self:center; justify-content:center;\">\n    <!-- Orchestration (top) -->\n    <div style=\"display:flex; align-items:center; gap:22px; background:linear-gradient(90deg,rgba(80,36,199,0.28),rgba(80,36,199,0.09)); border:1px solid rgba(80,36,199,0.65); border-radius:12px; padding:18px 28px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:15px; color:#9a8fb5; width:30px;\">07<\u002Fspan>\n      <span style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:27px; letter-spacing:-0.01em; color:#5024C7; width:330px;\">ORCHESTRATION<\u002Fspan>\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357;\">single / multi-agent · choreography vs. control<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"height:12px; width:1px; background:rgba(26,20,16,0.18); align-self:center;\"><\u002Fdiv>\n    <!-- Cross-cutting band -->\n    <div style=\"position:relative; border:1px solid rgba(26,20,16,0.34); background:rgba(26,20,16,0.06); border-radius:12px; padding:18px 16px 16px; display:flex; gap:13px;\">\n      <span style=\"position:absolute; top:-11px; left:26px; background:#F4F0E8; padding:0 12px; font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.14em; color:#FF6A2B;\">CROSS-CUTTING CONCERNS<\u002Fspan>\n      <div style=\"flex:1; padding:14px 20px; border-right:1px solid rgba(26,20,16,0.1);\"><div style=\"display:flex; align-items:baseline; gap:12px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#9a8fb5;\">04<\u002Fspan><span style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410;\">Observability<\u002Fspan><\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:16px; color:#6b6357; margin-top:5px;\">traces · reasoning chains · confidence<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1; padding:14px 20px; border-right:1px solid rgba(26,20,16,0.1);\"><div style=\"display:flex; align-items:baseline; gap:12px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#9a8fb5;\">05<\u002Fspan><span style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410;\">Testing / Evals<\u002Fspan><\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:16px; color:#6b6357; margin-top:5px;\">regression · non-det · contracts<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1; padding:14px 20px;\"><div style=\"display:flex; align-items:baseline; gap:12px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#9a8fb5;\">06<\u002Fspan><span style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410;\">Guardrails / Auth<\u002Fspan><\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:16px; color:#6b6357; margin-top:5px;\">scoped creds · budget · stop<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:12px; width:1px; background:rgba(26,20,16,0.18); align-self:center;\"><\u002Fdiv>\n    <!-- Skills -->\n    <div style=\"display:flex; align-items:center; gap:22px; background:rgba(26,20,16,0.12); border:1px solid rgba(26,20,16,0.4); border-radius:12px; padding:18px 28px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:15px; color:#9a8fb5; width:30px;\">03<\u002Fspan>\n      <span style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:27px; letter-spacing:-0.01em; color:#1a1410; width:330px;\">SKILLS + CONTEXT<\u002Fspan>\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357;\">modular knowledge + tools · dynamic assembly · progressive disclosure<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"height:12px; width:1px; background:rgba(26,20,16,0.18); align-self:center;\"><\u002Fdiv>\n    <!-- Memory -->\n    <div style=\"display:flex; align-items:center; gap:22px; background:rgba(26,20,16,0.12); border:1px solid rgba(26,20,16,0.4); border-radius:12px; padding:18px 28px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:15px; color:#9a8fb5; width:30px;\">02<\u002Fspan>\n      <span style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:27px; letter-spacing:-0.01em; color:#1a1410; width:330px;\">MEMORY<\u002Fspan>\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357;\">short-term / long-term · episodic · tiered<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"height:12px; width:1px; background:rgba(26,20,16,0.18); align-self:center;\"><\u002Fdiv>\n    <!-- Runtime (foundation) -->\n    <div style=\"display:flex; align-items:center; gap:22px; background:linear-gradient(90deg,rgba(255,106,43,0.28),rgba(255,106,43,0.09)); border:1px solid rgba(255,106,43,0.65); border-radius:12px; padding:18px 28px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:15px; color:#caa089; width:30px;\">01<\u002Fspan>\n      <span style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:27px; letter-spacing:-0.01em; color:#D9531E; width:330px;\">RUNTIME<\u002Fspan>\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357;\">execution · sessions · persistence · snapshots<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute; bottom:54px; left:96px; right:96px; display:flex; align-items:center; gap:20px; border-top:1px solid rgba(26,20,16,0.12); padding-top:24px;\">\n    <div style=\"display:flex; align-items:center; gap:10px; flex-shrink:0;\">\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:22px; color:#5024C7;\">At<\u002Fspan>\n      <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"height:16px; width:auto; display:block; transform:translateY(1px);\">\n    <\u002Fdiv>\n    <span style=\"width:1px; height:26px; background:rgba(26,20,16,0.16); flex-shrink:0;\"><\u002Fspan>\n    <div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#2a2118; white-space:nowrap;\">Production agents across <span style=\"font-weight: 600;\">120+ microservices<\u002Fspan> &nbsp;·&nbsp; <span style=\"font-weight: 600;\">30+ agents<\u002Fspan> &nbsp;·&nbsp; <span style=\"font-weight: 600;\">20K+<\u002Fspan> sessions/day &nbsp;·&nbsp; <span style=\"font-weight: 600;\">1B<\u002Fspan> tokens/day<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 4 · RUNTIME ===== -->\n<section data-label=\"Runtime\" data-screen-label=\"04\" data-speaker-notes=\"We spent a decade architecting stateless microservices — throw away the instance, state lives in the DB. Now compute is inherently stateful: agents have sessions, context that accumulates, they need to resume. The runtime IS the state. In under a year all three clouds shipped purpose-built agent runtimes — sandboxed, session-persistent, lifecycle-managed (AWS Firecracker, Azure Hyper-V, GCP gVisor + warm pools). The paradigm flipped from 'stateless by design' to 'stateful by necessity.' At Navan we persist conversations to S3 and hydrate them back to resume — state follows the session, not the instance. Transition: a session that remembers its filesystem is not the same as an agent that remembers what it learned — that's memory.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:72px 116px 112px; display:flex; flex-direction:column; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"display:flex; align-items:center; gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:#fff; background:linear-gradient(90deg,#7C4DFF,#5024C7); padding:8px 14px; border-radius:8px;\">01<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:19px; letter-spacing:0.16em; color:#8a8175;\">RUNTIME &nbsp;·&nbsp; LAYER 01 / 07<\u002Fspan>\n    <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:58px; line-height:1.0; letter-spacing:-0.028em; color:#1a1410; margin-top:26px; min-height:116px; display:flex; flex-direction:column; justify-content:flex-end;\">From Stateless by Design to Stateful by Necessity<\u002Fh1>\n  <p style=\"font-family:'Space Grotesk',sans-serif; font-size:26px; color:#6b6357; height:74px; margin-top:18px; max-width:1300px;\"><span style=\"color:#a89e8f;\">The problem:<\u002Fspan> agents need isolated, stateful, resumable execution environments.<\u002Fp>\n\n  <div style=\"display:flex; gap:54px; margin-top:38px; flex:1; min-height:0; align-items:flex-start;\">\n    <div style=\"flex:1; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:0.12em; color:#8a8175; margin-bottom:24px;\">KEY CAPABILITIES<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:27px; color:#1a1410;\">Sandboxed isolation<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#6b6357; margin-top:5px;\">each session gets its own VM — no shared kernel, no cross-session leakage<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:27px; color:#1a1410;\">Session persistence<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#6b6357; margin-top:5px;\">filesystem state survives idle / restart cycles<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:27px; color:#1a1410;\">Lifecycle management<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#6b6357; margin-top:5px;\">auto-destruction after idle timeout, max lifetime caps<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:27px; color:#1a1410;\">Framework-agnostic<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#6b6357; margin-top:5px;\">bring any agent framework, any model<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"width:470px; border-radius:18px; padding:2px; background:linear-gradient(160deg,#7C4DFF,#5024C7 58%,#FF6A2B); flex-shrink:0; align-self:flex-start;\">\n      <div style=\"background:#fffdf8; border-radius:16px; padding:28px; display:flex; flex-direction:column; min-height:352px; box-sizing:border-box;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.1em; color:#5024C7;\">CLOUD COMPARISON<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#8a8175;\">AWS · AZURE · GCP<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:24px; align-items:center;\">\n          <div data-qr=\"https://rmilev.github.io/agent-infrastructure-stack/#runtime\" data-qr-size=\"118\" data-qr-fg=\"#1a1410\" style=\"width:118px; height:118px; flex-shrink:0;\"><\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410; line-height:1.15; letter-spacing:-0.02em;\">Scan for the full table<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; color:#897f72; margin-top:10px; line-height:1.4;\">Product · isolation · state · status for all three clouds.<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#5024C7; margin-top:14px;\">↳ /agent-stack#runtime<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px; padding-top:20px; border-top:1px solid rgba(26,20,16,0.08); font-family:'Space Grotesk',sans-serif; font-size:19px; color:#6b6357;\">All shipped <span style=\"color:#1a1410; font-weight:600;\">2025–2026<\u002Fspan> — AWS &amp; GCP GA, Azure preview.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:40px; background:linear-gradient(90deg,rgba(80,36,199,0.10),rgba(80,36,199,0.02)); border:1px solid rgba(80,36,199,0.20); border-radius:18px; padding:30px 38px;\">\n    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:22px;\">\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:22px; color:#5024C7;\">At<\u002Fspan>\n      <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"height:16px; width:auto; display:block; transform:translateY(1px);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.16em; color:#a89e8f; margin-left:14px;\">IN PRODUCTION<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:44px;\">\n      <div style=\"flex:1; display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#2a2118; line-height:1.45;\">Conversations persisted to S3, hydrated back into runtime on resume<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1; display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#2a2118; line-height:1.45;\">Session state follows the conversation, not the instance<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1; display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#2a2118; line-height:1.45;\">Frameworks: Claude Agent SDK, OpenAI Agents SDK, LangGraph, Google ADK<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<!-- ===== SLIDE 5 · MEMORY ===== -->\n<section data-label=\"Memory\" data-screen-label=\"05\" data-speaker-notes=\"RAG had a good run and it's still useful for grounding against static knowledge bases — but it's static, it doesn't evolve or learn from interactions. What we need is memory: the ability to build up knowledge over time (this user prefers window seats; approach A failed last time; this customer's compliance requirements changed). The architecture is essentially the same across all three clouds: ingest events, extract what's worth remembering with an LLM, consolidate, retrieve semantically. The key design decision: not everything gets remembered — an LLM judges what's valuable, closer to human memory than a database. Tiers matter: short-term working context, long-term facts, episodic reflections, procedural routines. At Navan, RAG broke because top-K retrieval fetches, it doesn't investigate — we fixed it with tiered memory plus agent-driven retrieval decisions.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:72px 116px 96px; display:flex; flex-direction:column; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"display:flex; align-items:center; gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:#fff; background:linear-gradient(90deg,#7C4DFF,#5024C7); padding:8px 14px; border-radius:8px;\">02<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:19px; letter-spacing:0.16em; color:#8a8175;\">MEMORY &nbsp;·&nbsp; LAYER 02 / 07<\u002Fspan>\n    <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:58px; line-height:1.0; letter-spacing:-0.028em; color:#1a1410; margin-top:26px; min-height:116px; display:flex; flex-direction:column; justify-content:flex-end;\">Memory Is Not Retrieval<\u002Fh1>\n  <p style=\"font-family:'Space Grotesk',sans-serif; font-size:26px; color:#6b6357; height:74px; margin-top:18px; max-width:1340px;\"><span style=\"color:#a89e8f;\">The problem:<\u002Fspan> agents need to remember across sessions — not just retrieve from static knowledge bases.<\u002Fp>\n\n  <div style=\"display:flex; gap:54px; margin-top:38px; flex:1; min-height:0;\">\n    <!-- left: pipeline + tiers -->\n    <div style=\"flex:1; display:flex; flex-direction:column; gap:40px;\">\n      <div style=\"margin-top:30px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:0.12em; color:#8a8175; margin-bottom:18px;\">THE PIPELINE — SAME ACROSS PROVIDERS<\u002Fdiv>\n        <div style=\"display:flex; align-items:stretch; gap:0;\">\n          <div style=\"flex:1; display:flex; flex-direction:column; gap:6px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#7C4DFF;\">01<\u002Fspan><span style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410;\">Ingest<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:#6b6357;\">raw events flow in<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; color:#c3b9aa; font-size:24px; padding:0 6px;\">→<\u002Fdiv>\n          <div style=\"flex:1; display:flex; flex-direction:column; gap:6px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#7C4DFF;\">02<\u002Fspan><span style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410;\">Extract<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:#6b6357;\">LLM picks what matters<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; color:#c3b9aa; font-size:24px; padding:0 6px;\">→<\u002Fdiv>\n          <div style=\"flex:1; display:flex; flex-direction:column; gap:6px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#7C4DFF;\">03<\u002Fspan><span style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410;\">Consolidate<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:#6b6357;\">merge, dedupe, resolve<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; color:#c3b9aa; font-size:24px; padding:0 6px;\">→<\u002Fdiv>\n          <div style=\"flex:1; display:flex; flex-direction:column; gap:6px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#7C4DFF;\">04<\u002Fspan><span style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410;\">Retrieve<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:#6b6357;\">semantic at query<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:0.12em; color:#8a8175; margin-bottom:18px;\">TIERED MEMORY<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n          <div style=\"background:rgba(26,20,16,0.035); border:1px solid rgba(26,20,16,0.1); border-radius:12px; padding:18px 20px;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:21px; color:#1a1410;\">Short-term <span style=\"font-family:'JetBrains Mono',monospace; font-weight:400; font-size:14px; color:#8a8175;\">· single session<\u002Fspan><\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; color:#6b6357; margin-top:5px;\">turns, tool results, working state<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:rgba(26,20,16,0.035); border:1px solid rgba(26,20,16,0.1); border-radius:12px; padding:18px 20px;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:21px; color:#1a1410;\">Long-term <span style=\"font-family:'JetBrains Mono',monospace; font-weight:400; font-size:14px; color:#8a8175;\">· indefinite<\u002Fspan><\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; color:#6b6357; margin-top:5px;\">preferences, knowledge, decisions<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:rgba(26,20,16,0.035); border:1px solid rgba(26,20,16,0.1); border-radius:12px; padding:18px 20px;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:21px; color:#1a1410;\">Episodic <span style=\"font-family:'JetBrains Mono',monospace; font-weight:400; font-size:14px; color:#8a8175;\">· cross-session<\u002Fspan><\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; color:#6b6357; margin-top:5px;\">what worked, what didn't — with reflections<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:rgba(26,20,16,0.035); border:1px solid rgba(26,20,16,0.1); border-radius:12px; padding:18px 20px;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:21px; color:#1a1410;\">Procedural <span style=\"font-family:'JetBrains Mono',monospace; font-weight:400; font-size:14px; color:#8a8175;\">· cross-session<\u002Fspan><\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; color:#6b6357; margin-top:5px;\">how-to routines learned over time<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- right: QR -->\n    <div style=\"width:470px; flex-shrink:0; align-self:flex-start;\">\n      <div style=\"border-radius:18px; padding:2px; background:linear-gradient(160deg,#7C4DFF,#5024C7 58%,#FF6A2B);\">\n        <div style=\"background:#fffdf8; border-radius:16px; padding:26px; display:flex; flex-direction:column; min-height:352px; box-sizing:border-box;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.1em; color:#5024C7;\">CLOUD COMPARISON<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#8a8175;\">AWS · AZURE · GCP<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:22px; align-items:center;\">\n            <div data-qr=\"https://rmilev.github.io/agent-infrastructure-stack/#memory\" data-qr-size=\"118\" data-qr-fg=\"#1a1410\" style=\"width:118px; height:118px; flex-shrink:0;\"><\u002Fdiv>\n            <div>\n              <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410; line-height:1.15; letter-spacing:-0.02em;\">Scan for the full table<\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:#897f72; margin-top:8px; line-height:1.4;\">Products · memory types · scoping · status.<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#5024C7; margin-top:12px;\">↳ /agent-stack#memory<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:22px; padding-top:20px; border-top:1px solid rgba(26,20,16,0.08); font-family:'Space Grotesk',sans-serif; font-size:19px; color:#6b6357;\">AWS &amp; GCP <span style=\"color:#1a1410; font-weight:600;\">GA<\u002Fspan> · Azure preview.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:30px; background:linear-gradient(90deg,rgba(80,36,199,0.10),rgba(80,36,199,0.02)); border:1px solid rgba(80,36,199,0.20); border-radius:18px; padding:24px 38px;\">\n    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\">\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:22px; color:#5024C7;\">At<\u002Fspan>\n      <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"height:16px; width:auto; display:block; transform:translateY(1px);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.16em; color:#a89e8f; margin-left:14px;\">IN PRODUCTION<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:44px;\">\n      <div style=\"flex:1; display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#2a2118; line-height:1.45;\">RAG broke: top-K retrieval doesn't reason — it fetches, not investigates<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1; display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#2a2118; line-height:1.45;\">Fix: tiered memory (short-term raw events + long-term summaries) + agent-driven retrieval decisions<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 6 · SKILLS + CONTEXT ===== -->\n<section data-label=\"Skills\" data-screen-label=\"06\" data-speaker-notes=\"Everyone's talking about context engineering, but it's not 'cram more into the prompt' — it's an architecture for assembling the right context at the right time. Retrieval, summarization, compression are techniques; at scale you need a structural primitive. At Navan that primitive is the skill: a unit of context bundling knowledge and tools. Some skills are pure knowledge, no tools. Skills reference each other and compose. Handling a booking activates booking + policy + maybe payment skills — but if the customer is pay-later, the payment skill never loads, that context never enters the window. Why it matters: you can test a skill in isolation, version it independently, and reuse it across agents. Not one massive prompt — modular, composable, dynamically assembled.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:72px 116px 96px; display:flex; flex-direction:column; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"display:flex; align-items:center; gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:#fff; background:linear-gradient(90deg,#7C4DFF,#5024C7); padding:8px 14px; border-radius:8px;\">03<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:19px; letter-spacing:0.16em; color:#8a8175;\">SKILLS + CONTEXT &nbsp;·&nbsp; LAYER 03 / 07<\u002Fspan>\n    <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:58px; line-height:1.0; letter-spacing:-0.028em; color:#1a1410; margin-top:26px; min-height:116px; display:flex; flex-direction:column; justify-content:flex-end;\">Skills Are the Units of Context<\u002Fh1>\n  <p style=\"font-family:'Space Grotesk',sans-serif; font-size:26px; color:#6b6357; height:74px; margin-top:18px; max-width:1400px;\"><span style=\"color:#a89e8f;\">The problem:<\u002Fspan> what the agent knows at decision time determines everything. Too little context → wrong answers. Too much → confusion, cost, latency.<\u002Fp>\n\n  <div style=\"display:flex; gap:54px; margin-top:38px; flex:1; min-height:0; align-items:flex-start;\">\n    <!-- left: common approaches -->\n    <div style=\"width:560px; flex-shrink:0; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:0.12em; color:#8a8175; margin-bottom:22px;\">COMMON APPROACHES<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:24px;\">\n        <div style=\"display:flex; gap:16px;\"><span style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:19px; color:#7C4DFF; flex-shrink:0; line-height:1.3;\">01<\u002Fspan><div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410; line-height:1.3;\">Retrieval<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357; line-height:1.35; margin-top:2px;\">pull relevant docs at query time (RAG)<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:16px;\"><span style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:19px; color:#7C4DFF; flex-shrink:0; line-height:1.3;\">02<\u002Fspan><div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410; line-height:1.3;\">Summarization<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357; line-height:1.35; margin-top:2px;\">compress prior context to fit the window<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:16px;\"><span style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:19px; color:#7C4DFF; flex-shrink:0; line-height:1.3;\">03<\u002Fspan><div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410; line-height:1.3;\">Compression / pruning<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357; line-height:1.35; margin-top:2px;\">drop low-value tokens<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:16px;\"><span style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:19px; color:#7C4DFF; flex-shrink:0; line-height:1.3;\">04<\u002Fspan><div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410; line-height:1.3;\">Structured prompting<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357; line-height:1.35; margin-top:2px;\">organize context for better attention<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- right: At Navan skill diagram -->\n    <div style=\"flex:1; background:linear-gradient(160deg,rgba(80,36,199,0.09),rgba(80,36,199,0.02)); border:1px solid rgba(80,36,199,0.22); border-radius:18px; padding:28px 30px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:20px;\">\n        <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:21px; color:#5024C7;\">At<\u002Fspan>\n        <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"height:15px; width:auto; display:block; transform:translateY(1px);\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.16em; color:#a89e8f; margin-left:12px;\">SKILLS = KNOWLEDGE + TOOLS<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"background:#fffdf8; border:1px solid rgba(26,20,16,0.08); border-radius:12px; padding:16px; margin-bottom:18px;\">\n        <div style=\"text-align:center; font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.1em; color:#8a8175; padding:6px 0 14px;\">AGENT EXECUTION<\u002Fdiv>\n        <div style=\"display:flex; gap:12px;\">\n          <div style=\"flex:1; background:rgba(124,77,255,0.1); border:1px solid rgba(124,77,255,0.3); border-radius:10px; padding:14px 14px 16px; text-align:center;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:19px; color:#1a1410;\">Booking<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#7C4DFF; margin-top:8px; line-height:1.5;\">[tools]<br>[knowledge]<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; background:rgba(124,77,255,0.1); border:1px solid rgba(124,77,255,0.3); border-radius:10px; padding:14px 14px 16px; text-align:center;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:19px; color:#1a1410;\">Policy<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#7C4DFF; margin-top:8px; line-height:1.5;\">[knowledge]<br>only<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; background:rgba(26,20,16,0.04); border:1px dashed rgba(26,20,16,0.25); border-radius:10px; padding:14px 14px 16px; text-align:center;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:19px; color:#a89e8f;\">Payment<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#a89e8f; margin-top:8px; line-height:1.5;\">not loaded<br>(pay-later)<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center; font-family:'JetBrains Mono',monospace; font-size:13px; color:#a89e8f; margin-top:12px;\">↕ skills reference each other<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:13px; margin-top:24px;\">\n        <div style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#7C4DFF; flex-shrink:0;\"><\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; color:#2a2118;\"><b style=\"font-weight:600;\">Dynamic selection<\u002Fb> — load skills at session start<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#7C4DFF; flex-shrink:0;\"><\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; color:#2a2118;\"><b style=\"font-weight:600;\">Progressive disclosure<\u002Fb> — context revealed as needed<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#7C4DFF; flex-shrink:0;\"><\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; color:#2a2118;\"><b style=\"font-weight:600;\">Testable, versionable, reusable, composable<\u002Fb> — not one giant prompt<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<!-- ===== SLIDE 7 · OBSERVABILITY ===== -->\n<section data-label=\"Observability\" data-screen-label=\"07\" data-speaker-notes=\"The first thing we learned: you need traces on every tool call, not just the final output. We hook into OTel and capture four things — current goal, reasoning, belief state, and the tool being called — so you get the WHY, not just the what. Second: confidence signals. Every response is tagged — confident, multiple paths, inferred, or not found — and that taxonomy drives alerting; a spike in 'inferred_answer' means something changed upstream. And replay: map every conversation to its AgentCore session, store everything in S3 with UUIDv7 for time-ordering, then hydrate and replay. That's how you debug non-deterministic systems — not by reading logs, but by re-running decisions.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:72px 116px 96px; display:flex; flex-direction:column; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"display:flex; align-items:center; gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:#fff; background:linear-gradient(90deg,#7C4DFF,#5024C7); padding:8px 14px; border-radius:8px;\">04<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:19px; letter-spacing:0.16em; color:#8a8175;\">OBSERVABILITY &nbsp;·&nbsp; CROSS-CUTTING 04 / 07<\u002Fspan>\n    <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:58px; line-height:1.0; letter-spacing:-0.028em; color:#1a1410; margin-top:26px; min-height:116px; display:flex; flex-direction:column; justify-content:flex-end;\"><span>You Can't <span style=\"font-family:'JetBrains Mono',monospace; font-weight:700; font-size:48px; background:rgba(80,36,199,0.1); color:#5024C7; padding:2px 14px; border-radius:8px;\">tail -f<\u002Fspan> an Agent<\u002Fspan><\u002Fh1>\n  <p style=\"font-family:'Space Grotesk',sans-serif; font-size:26px; color:#6b6357; height:74px; margin-top:18px; max-width:1340px;\"><span style=\"color:#a89e8f;\">The problem:<\u002Fspan> agent makes a bad decision on step 7 of 12 — and you find out from the user, not your monitoring.<\u002Fp>\n\n  <div style=\"display:flex; gap:54px; margin-top:38px; flex:1; min-height:0; align-items:flex-start;\">\n    <div style=\"flex:1;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:0.12em; color:#8a8175; margin-bottom:24px;\">WHAT'S NEEDED<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:27px; color:#1a1410;\">Execution traces<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#6b6357; margin-top:5px;\">what did it do?<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:27px; color:#1a1410;\">Reasoning chains<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#6b6357; margin-top:5px;\">why did it do it?<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:27px; color:#1a1410;\">Confidence signals<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#6b6357; margin-top:5px;\">how sure was it?<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:27px; color:#1a1410;\">Replay capability<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#6b6357; margin-top:5px;\">re-run with different context?<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:470px; border-radius:18px; padding:2px; background:linear-gradient(160deg,#7C4DFF,#5024C7 58%,#FF6A2B); flex-shrink:0; align-self:flex-start;\">\n      <div style=\"background:#fffdf8; border-radius:16px; padding:28px; display:flex; flex-direction:column; min-height:352px; box-sizing:border-box;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.1em; color:#5024C7;\">CLOUD COMPARISON<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#8a8175;\">AWS · AZURE · GCP<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:24px; align-items:center;\">\n          <div data-qr=\"https://rmilev.github.io/agent-infrastructure-stack/#observability\" data-qr-size=\"132\" data-qr-fg=\"#1a1410\" style=\"width:132px; height:132px; flex-shrink:0;\"><\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410; line-height:1.15; letter-spacing:-0.02em;\">Scan for the full table<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:#897f72; margin-top:8px; line-height:1.4;\">Tracing, reasoning visibility, OTel &amp; status, all three clouds.<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#5024C7; margin-top:12px;\">↳ /agent-stack#observability<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px; padding-top:20px; border-top:1px solid rgba(26,20,16,0.08); font-family:'Space Grotesk',sans-serif; font-size:18px; color:#6b6357; line-height:1.4;\">X-Ray · App Insights · Cloud Trace — <span style=\"color:#1a1410; font-weight:600;\">none agent-native.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:30px; background:linear-gradient(90deg,rgba(80,36,199,0.10),rgba(80,36,199,0.02)); border:1px solid rgba(80,36,199,0.20); border-radius:18px; padding:24px 38px;\">\n    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\">\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:22px; color:#5024C7;\">At<\u002Fspan>\n      <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"height:16px; width:auto; display:block; transform:translateY(1px);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.16em; color:#a89e8f; margin-left:14px;\">IN PRODUCTION<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px 44px;\">\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">OTel hooks on every tool call<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">Traces capture <span style=\"font-family:'JetBrains Mono',monospace; font-size:18px; color:#5024C7;\">current_goal · reasoning · belief_state · tool_call<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">Confidence per response: <span style=\"font-family:'JetBrains Mono',monospace; font-size:17px; color:#5024C7;\">confident_answer | multiple_possible_paths | inferred_answer | answer_not_found<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">Replay: <span style=\"font-family:'JetBrains Mono',monospace; font-size:18px; color:#5024C7;\">conversation_id → S3 (UUIDv7)<\u002Fspan> → hydrate &amp; resume<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 8 · TESTING ===== -->\n<section data-label=\"Testing\" data-screen-label=\"08\" data-speaker-notes=\"This is the biggest gap in the industry — and we don't have it fully figured out either, but here's what works. Two types of evals: E2E tests the full flow (did it solve the user's problem?), trajectory looks at the path (reasonable steps or thrash?). Both automated, both online — in production, not just CI, because your test environment doesn't reproduce production behavior in non-deterministic systems. The key unlock: skills as testable units — change a skill, run only the scenarios that exercise it. And the confidence signals from observability feed back in: a spike in 'inferred_answer' or 'answer_not_found' after a deploy is a regression signal before any user complains.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:72px 116px 88px; display:flex; flex-direction:column; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"display:flex; align-items:center; gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:#fff; background:linear-gradient(90deg,#7C4DFF,#5024C7); padding:8px 14px; border-radius:8px;\">05<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:19px; letter-spacing:0.16em; color:#8a8175;\">TESTING / EVALS &nbsp;·&nbsp; CROSS-CUTTING 05 / 07<\u002Fspan>\n    <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:58px; line-height:1.0; letter-spacing:-0.028em; color:#1a1410; margin-top:26px; min-height:116px; display:flex; flex-direction:column; justify-content:flex-end;\">Testing: The Biggest Gap<\u002Fh1>\n  <p style=\"font-family:'Space Grotesk',sans-serif; font-size:26px; color:#6b6357; height:74px; margin-top:18px; max-width:1340px;\"><span style=\"color:#a89e8f;\">The problem:<\u002Fspan> how do you know your agent got worse before users do?<\u002Fp>\n\n  <div style=\"display:flex; gap:54px; margin-top:38px; flex:1; min-height:0;\">\n    <div style=\"flex:1; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:0.12em; color:#8a8175; margin-bottom:20px;\">THE CHALLENGES<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n        <div style=\"padding-left:20px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:23px; color:#1a1410; line-height:1.4;\">Non-deterministic behavior — same input, different output<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:20px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:23px; color:#1a1410; line-height:1.4;\">Prompt changes have invisible blast radius<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:20px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:23px; color:#1a1410; line-height:1.4;\">No ground truth for open-ended agent behavior<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:20px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:23px; color:#1a1410; line-height:1.4;\">LLM-as-a-judge works but is expensive<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:470px; border-radius:18px; padding:2px; background:linear-gradient(160deg,#7C4DFF,#5024C7 58%,#FF6A2B); flex-shrink:0; align-self:flex-start;\">\n      <div style=\"background:#fffdf8; border-radius:16px; padding:28px; display:flex; flex-direction:column; min-height:352px; box-sizing:border-box;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.1em; color:#5024C7;\">CLOUD COMPARISON<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#8a8175;\">AWS · AZURE · GCP<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:24px; align-items:center;\">\n          <div data-qr=\"https://rmilev.github.io/agent-infrastructure-stack/#testing\" data-qr-size=\"132\" data-qr-fg=\"#1a1410\" style=\"width:132px; height:132px; flex-shrink:0;\"><\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410; line-height:1.15; letter-spacing:-0.02em;\">Scan for the full table<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:#897f72; margin-top:8px; line-height:1.4;\">Evaluators, task completion, tool accuracy, CI/CD, status.<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#5024C7; margin-top:12px;\">↳ /agent-stack#testing<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px; padding-top:20px; border-top:1px solid rgba(26,20,16,0.08); font-family:'Space Grotesk',sans-serif; font-size:18px; color:#6b6357; line-height:1.4;\">Azure &amp; GCP ship agent evaluators; AWS agent-eval maturity unclear.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:26px; background:linear-gradient(90deg,rgba(80,36,199,0.10),rgba(80,36,199,0.02)); border:1px solid rgba(80,36,199,0.20); border-radius:18px; padding:22px 38px;\">\n    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:14px;\">\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:22px; color:#5024C7;\">At<\u002Fspan>\n      <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"height:16px; width:auto; display:block; transform:translateY(1px);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.16em; color:#a89e8f; margin-left:14px;\">IN PRODUCTION<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px 44px;\">\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">E2E evals + trajectory evals, all automated<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">Online scoring — production, not just pre-deploy<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">Skills as testable units: change one skill → do these 50 scenarios still pass?<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">Confidence signals feed eval: spike in <span style=\"font-family:'JetBrains Mono',monospace; font-size:17px; color:#5024C7;\">inferred_answer<\u002Fspan> = regression<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<!-- ===== SLIDE 9 · GUARDRAILS & AUTH ===== -->\n<section data-label=\"Guardrails\" data-screen-label=\"09\" data-speaker-notes=\"The auth question is more nuanced than you'd think. Sometimes the agent acts on behalf of the user — booking with their permissions. Sometimes it's a service account running a batch job. The scoping differs. Key design decision: policy checks happen BEFORE tool execution, not after — if the agent is about to call something it shouldn't, block it before it fires; you can't undo an API call. And the real gap: no cloud gives you budget controls at the agent level. We built our own — token caps, action count limits, time limits. Without those, a confused agent burns through your API budget in hours.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:72px 116px 96px; display:flex; flex-direction:column; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"display:flex; align-items:center; gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:#fff; background:linear-gradient(90deg,#7C4DFF,#5024C7); padding:8px 14px; border-radius:8px;\">06<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:19px; letter-spacing:0.16em; color:#8a8175;\">GUARDRAILS / AUTH &nbsp;·&nbsp; CROSS-CUTTING 06 / 07<\u002Fspan>\n    <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:58px; line-height:1.0; letter-spacing:-0.028em; color:#1a1410; margin-top:26px; min-height:116px; display:flex; flex-direction:column; justify-content:flex-end;\">What Is the Agent Allowed to Do?<\u002Fh1>\n  <p style=\"font-family:'Space Grotesk',sans-serif; font-size:26px; color:#6b6357; height:74px; margin-top:18px; max-width:1400px;\"><span style=\"color:#a89e8f;\">The problem:<\u002Fspan> the agent is a new kind of principal — not a user, not a service. It needs identity, scoped authorization, and enforcement.<\u002Fp>\n\n  <div style=\"display:flex; gap:54px; margin-top:38px; flex:1; min-height:0;\">\n    <div style=\"flex:1; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:0.12em; color:#8a8175; margin-bottom:18px;\">KEY CAPABILITIES NEEDED<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"padding-left:20px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#1a1410; line-height:1.4;\"><b style=\"font-weight:600;\">Scoped credentials<\u002Fb> — book a flight but not wire $50k<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:20px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#1a1410; line-height:1.4;\"><b style=\"font-weight:600;\">Budget limits<\u002Fb> — token spend, action count, time limits<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:20px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#1a1410; line-height:1.4;\"><b style=\"font-weight:600;\">Least-privilege<\u002Fb> — the IAM of agents<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:20px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#1a1410; line-height:1.4;\"><b style=\"font-weight:600;\">Content safety<\u002Fb> — prevent harmful outputs, PII leakage<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:20px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#1a1410; line-height:1.4;\"><b style=\"font-weight:600;\">Kill switches<\u002Fb> — halt a runaway agent<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:470px; border-radius:18px; padding:2px; background:linear-gradient(160deg,#7C4DFF,#5024C7 58%,#FF6A2B); flex-shrink:0; align-self:flex-start;\">\n      <div style=\"background:#fffdf8; border-radius:16px; padding:28px; display:flex; flex-direction:column; min-height:352px; box-sizing:border-box;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.1em; color:#5024C7;\">CLOUD COMPARISON<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#8a8175;\">AWS · AZURE · GCP<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:24px; align-items:center;\">\n          <div data-qr=\"https://rmilev.github.io/agent-infrastructure-stack/#guardrails\" data-qr-size=\"132\" data-qr-fg=\"#1a1410\" style=\"width:132px; height:132px; flex-shrink:0;\"><\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410; line-height:1.15; letter-spacing:-0.02em;\">Scan for the full table<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:#897f72; margin-top:8px; line-height:1.4;\">Identity, policy enforcement &amp; kill-switch, each cloud's approach.<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#5024C7; margin-top:12px;\">↳ /agent-stack#guardrails<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px; padding-top:20px; border-top:1px solid rgba(26,20,16,0.08); font-family:'Space Grotesk',sans-serif; font-size:18px; color:#6b6357; line-height:1.4;\"><span style=\"color:#D9531E; font-weight:600;\">The gap:<\u002Fspan> no cloud has native agent-level budget / token controls — you build that yourself.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:30px; background:linear-gradient(90deg,rgba(80,36,199,0.10),rgba(80,36,199,0.02)); border:1px solid rgba(80,36,199,0.20); border-radius:18px; padding:24px 38px;\">\n    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\">\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:22px; color:#5024C7;\">At<\u002Fspan>\n      <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"height:16px; width:auto; display:block; transform:translateY(1px);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.16em; color:#a89e8f; margin-left:14px;\">IN PRODUCTION<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:44px;\">\n      <div style=\"flex:1; display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#2a2118; line-height:1.45;\">Auth model: on-behalf-of-user OR service account (depends on use case)<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1; display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#2a2118; line-height:1.45;\">Pre-tool-call policy checks — guardrail fires before the tool executes<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1; display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#2a2118; line-height:1.45;\">Content filters on both input and output<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 10 · ORCHESTRATION ===== -->\n<section data-label=\"Orchestration\" data-screen-label=\"10\" data-speaker-notes=\"The industry consensus is clear: start with one agent. We learned this the hard way. Every agent boundary loses context at the handoff, adds latency, and compounds non-determinism. The failure modes are specific: cascading hallucinations (one agent invents, the next builds on it), goal drift (original intent gone three handoffs deep), and degraded critique (a reviewer agent tends to agree rather than push back). At Navan our default is a single agent with subagents scoped per domain; cross-domain we expose the other agent as an MCP tool through AgentCore Gateway — same OAuth, same gateway, agent-as-tool. The rule: split only when domain expertise clearly separates. Splitting for elegance is splitting too early.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:72px 116px 96px; display:flex; flex-direction:column; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"display:flex; align-items:center; gap:24px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:#fff; background:linear-gradient(90deg,#7C4DFF,#5024C7); padding:8px 14px; border-radius:8px;\">07<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:19px; letter-spacing:0.16em; color:#8a8175;\">ORCHESTRATION &nbsp;·&nbsp; LAYER 07 / 07<\u002Fspan>\n    <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:58px; line-height:1.0; letter-spacing:-0.028em; color:#1a1410; margin-top:26px; min-height:116px; display:flex; flex-direction:column; justify-content:flex-end;\">Single vs. Multi-Agent<\u002Fh1>\n  <p style=\"font-family:'Space Grotesk',sans-serif; font-size:26px; color:#6b6357; height:74px; margin-top:18px; max-width:1420px;\"><span style=\"color:#a89e8f;\">The problem:<\u002Fspan> one agent or many? Every agent boundary = context lost + another inference call + another point of non-determinism.<\u002Fp>\n\n  <div style=\"display:flex; gap:54px; margin-top:38px; flex:1; min-height:0;\">\n    <div style=\"flex:1; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:0.12em; color:#8a8175; margin-bottom:18px;\">FAILURE MODES<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:16px; flex:1; justify-content:flex-start;\">\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Cascading hallucinations<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357; margin-top:4px;\">Agent 1 hallucinates → Agent 2 builds on it → compounds<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Goal drift<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357; margin-top:4px;\">original intent lost across agent handoffs<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding-left:22px; border-left:4px solid #7C4DFF;\"><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Degraded critique<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#6b6357; margin-top:4px;\">agents agreeing with each other instead of challenging<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\
