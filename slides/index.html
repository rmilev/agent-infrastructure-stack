"width:470px; border-radius:18px; padding:2px; background:linear-gradient(160deg,#7C4DFF,#5024C7 58%,#FF6A2B); flex-shrink:0; align-self:flex-start;\">\n      <div style=\"background:#fffdf8; border-radius:16px; padding:28px; display:flex; flex-direction:column; min-height:352px; box-sizing:border-box;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.1em; color:#5024C7;\">CLOUD COMPARISON<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#8a8175;\">AWS · AZURE · GCP<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:24px; align-items:center;\">\n          <div data-qr=\"https://rmilev.github.io/agent-infrastructure-stack/#orchestration\" data-qr-size=\"132\" data-qr-fg=\"#1a1410\" style=\"width:132px; height:132px; flex-shrink:0;\"><\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:23px; color:#1a1410; line-height:1.15; letter-spacing:-0.02em;\">Scan for the full table<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:#897f72; margin-top:8px; line-height:1.4;\">Patterns &amp; inter-agent protocol (A2A) across all three clouds.<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#5024C7; margin-top:12px;\">↳ /agent-stack#orchestration<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px; padding-top:20px; border-top:1px solid rgba(26,20,16,0.08); font-family:'Space Grotesk',sans-serif; font-size:18px; color:#6b6357; line-height:1.4;\">GCP is the A2A originator (open standard, 50+ partners).<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:30px; background:linear-gradient(90deg,rgba(80,36,199,0.10),rgba(80,36,199,0.02)); border:1px solid rgba(80,36,199,0.20); border-radius:18px; padding:24px 38px;\">\n    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\">\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:22px; color:#5024C7;\">At<\u002Fspan>\n      <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"height:16px; width:auto; display:block; transform:translateY(1px);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.16em; color:#a89e8f; margin-left:14px;\">IN PRODUCTION<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:13px 44px;\">\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">Default: single agent with subagents per domain<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">Cross-domain: agent-as-MCP-tool (A2A protocol)<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">MCP Gateway: User → OAuth → AgentCore Gateway → REST + internal MCP servers<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; gap:14px; align-items:baseline;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#7C4DFF; flex-shrink:0; transform:translateY(-3px);\"><\u002Fspan><div style=\"font-family:'Space Grotesk',sans-serif; font-size:21px; color:#2a2118; line-height:1.4;\">Lesson: start single + good tools; split only when domain expertise separates<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<!-- ===== SLIDE 11 · WHAT'S STILL MISSING ===== -->\n<section data-label=\"Missing\" data-screen-label=\"11\" data-speaker-notes=\"That's the stack: runtime, memory, skills, observability, testing, guardrails, orchestration. Some layers mature fast — runtime is basically solved, memory is converging. But be honest about what's missing. Testing is the biggest gap: no consensus on testing non-deterministic behavior at scale; LLM-as-a-judge is expensive; open-ended behavior often has no ground truth. Cost predictability doesn't exist — same task can cost 10x depending on the reasoning path. Replay/debugging: you can see the trace after the fact but can't re-run a decision with different context — no counterfactual analysis. And standards: OTel GenAI is experimental, A2A is young, no universal trace format or portable skill definition. We're in the early innings — but the good news is we know what we need to build. We've seen this movie before.\" style=\"width:100%; height:100%; background:#F4F0E8; padding:72px 116px 80px; display:flex; flex-direction:column; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n    <div style=\"display:flex; align-items:center; gap:20px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:19px; letter-spacing:0.16em; color:#8a8175;\">WHERE THE STACK STANDS<\u002Fspan>\n    <\u002Fdiv>\n    <img src=\"aaadddc7-db53-4be4-bb51-43269ca000f8\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Archivo',sans-serif; font-weight:800; font-size:60px; line-height:1.0; letter-spacing:-0.03em; color:#1a1410; margin-top:22px;\">What's Still Painfully Missing<\u002Fh1>\n\n  <div style=\"display:flex; gap:28px; margin-top:44px; flex:1; min-height:0; align-items:center;\">\n    <!-- Solved -->\n    <div style=\"flex:1; background:rgba(31,138,91,0.06); border:1px solid rgba(31,138,91,0.32); border-radius:18px; padding:32px 30px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:26px;\">\n        <span style=\"width:13px; height:13px; border-radius:50%; background:#1F8A5B;\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:17px; letter-spacing:0.14em; color:#1F8A5B; font-weight:700;\">SOLVED<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:24px;\">\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Runtime<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#5a5246; margin-top:4px;\">sandboxed, session-persistent, all clouds ship it<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Memory<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#5a5246; margin-top:4px;\">converging on the same pipeline<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Tools / MCP<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#5a5246; margin-top:4px;\">standard interface layer, gateway support across clouds<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Emerging -->\n    <div style=\"flex:1; background:rgba(255,106,43,0.06); border:1px solid rgba(255,106,43,0.32); border-radius:18px; padding:32px 30px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:26px;\">\n        <span style=\"width:13px; height:13px; border-radius:50%; background:#D9531E;\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:17px; letter-spacing:0.14em; color:#D9531E; font-weight:700;\">EMERGING<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:24px;\">\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Observability<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#5a5246; margin-top:4px;\">traces exist, reasoning visibility improving, no standard yet<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Testing<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#5a5246; margin-top:4px;\">Azure / GCP shipping evaluators, but no consensus on approach<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Orchestration<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#5a5246; margin-top:4px;\">patterns clear, tooling experimental<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Missing -->\n    <div style=\"flex:1; background:rgba(80,36,199,0.06); border:1px solid rgba(80,36,199,0.32); border-radius:18px; padding:32px 30px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:26px;\">\n        <span style=\"width:13px; height:13px; border-radius:50%; background:#5024C7;\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:17px; letter-spacing:0.14em; color:#5024C7; font-weight:700;\">MISSING<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:24px;\">\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Cost &amp; budget controls<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#5a5246; margin-top:4px;\">no circuit breakers for reasoning spirals, no agent-level spend caps<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Replay &amp; debugging<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#5a5246; margin-top:4px;\">can't re-run a decision with different context<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:25px; color:#1a1410;\">Standards<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:#5a5246; margin-top:4px;\">OTel GenAI experimental, A2A young, no universal trace format<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 12 · CLOSE ===== -->\n<section data-label=\"Close\" data-screen-label=\"12\" data-speaker-notes=\"Last time — with microservices — we didn't know what we needed until it hurt. We stumbled into Zipkin, Kubernetes, contract testing; it took five years of production pain. This time we don't have that excuse. We've named the layers, shown what's working and what's missing. The clouds are moving, open source is moving. The difference between 2015 and now: we know what's needed, most of it already exists, the gaps are clear. Go build the rest. Thank you.\" style=\"width:100%; height:100%; background:#15110c; padding:96px 130px; display:flex; flex-direction:column; justify-content:center; font-family:'Space Grotesk',sans-serif; position:relative; overflow:hidden;\">\n  <div style=\"position:absolute; left:50%; bottom:-80px; transform:translateX(-50%); width:1300px; height:650px; border:2px solid rgba(124,77,255,0.16); border-bottom:none; border-top-left-radius:1300px; border-top-right-radius:1300px;\"><\u002Fdiv>\n  <div style=\"position:absolute; left:50%; bottom:-80px; transform:translateX(-50%); width:900px; height:450px; border:2px solid rgba(255,106,43,0.12); border-bottom:none; border-top-left-radius:900px; border-top-right-radius:900px;\"><\u002Fdiv>\n  <img src=\"b41ed3c2-2d99-4622-af0a-faa218425474\" alt=\"Navan\" style=\"position:absolute; top:77px; right:116px; height:28px; width:auto; opacity:0.9; display:block; z-index:6;\">\n  <div style=\"position:relative; max-width:1480px;\">\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:20px; letter-spacing:0.16em; color:#cbb8ff; margin-bottom:36px;\">THE LANDING<\u002Fdiv>\n    <h1 style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:84px; line-height:1.05; letter-spacing:-0.03em; color:#f6f3ec; text-wrap:balance;\">We know what's needed.<br>Most of it exists. <span style=\"background:linear-gradient(90deg,#cbb8ff,#FF8A56); -webkit-background-clip:text; background-clip:text; color:transparent;\">Go build the rest.<\u002Fspan><\u002Fh1>\n  <\u002Fdiv>\n  <div style=\"position:absolute; bottom:64px; left:130px; right:130px; display:flex; justify-content:space-between; align-items:flex-end;\">\n    <div style=\"font-family:'Space Grotesk',sans-serif; font-size:22px; color:#cbc4b8;\"><span style=\"color:#f4f1ea; font-weight:600;\">Roberto Milev<\u002Fspan> &nbsp;·&nbsp; <span style=\"color:#f4f1ea; font-weight:600;\">Uday Kanagala<\u002Fspan> &nbsp;<span style=\"color:#8a8175;\">— Architects, Navan<\u002Fspan><\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:16px; color:#8a8175;\">AI Engineer World's Fair 2026<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
